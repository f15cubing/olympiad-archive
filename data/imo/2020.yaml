- number: 3
  statement: |-
    There are $4n$ pebbles of weights $1, 2, 3, \dots, 4n.$ Each pebble is coloured in one of $n$ colours and there are four pebbles of each colour. Show that we can arrange the pebbles into two piles so that the following two conditions are both satisfied:

    - The total weights of both piles are the same.
    - Each pile contains two pebbles of each colour.
  source_url: https://www.imo-official.org/year_info.aspx?year=2020
- number: 4
  statement: There is an integer $n > 1$. There are $n^2$ stations on a slope of a mountain, all at different
    altitudes. Each of two cable car companies, $A$ and $B$, operates $k$ cable cars; each cable car provides
    a transfer from one of the stations to a higher one (with no intermediate stops). The $k$ cable cars
    of $A$ have $k$ different starting points and $k$ different finishing points, and a cable car which
    starts higher also finishes higher. The same conditions hold for $B$. We say that two stations are
    linked by a company if one can start from the lower station and reach the higher one by using one
    or more cars of that company (no other movements between stations are allowed). Determine the smallest
    positive integer $k$ for which one can guarantee that there are two stations that are linked by both
    companies.
  source_url: https://www.imo-official.org/year_info.aspx?year=2020
- number: 5
  statement: |-
    A deck of $n > 1$ cards is given. A positive integer is written on each card. The deck has the property that the arithmetic mean of the numbers on each pair of cards is also the geometric mean of the numbers on some collection of one or more cards.
    For which $n$ does it follow that the numbers on the cards are all equal?
  source_url: https://www.imo-official.org/year_info.aspx?year=2020
- number: 6
  statement: |-
