  statement: Let $\Gamma$ be the circumcircle of acute triangle $ABC$. Points $D$ and $E$ are on segments
    $AB$ and $AC$ respectively such that $AD = AE$. The perpendicular bisectors of $BD$ and $CE$ intersect
    minor arcs $AB$ and $AC$ of $\Gamma$ at points $F$ and $G$ respectively. Prove that lines $DE$ and
