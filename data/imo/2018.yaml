- number: 2
  statement: Find all integers $n \geq 3$ for which there exist real numbers $a_1, a_2, \dots a_{n + 2}$
    satisfying $a_{n + 1} = a_1$, $a_{n + 2} = a_2$ and$a_ia_{i + 1} + 1 = a_{i + 2},$for $i = 1, 2, \dots,
    n$.
  source_url: https://www.imo-official.org/year_info.aspx?year=2018
- number: 3
  statement: |-
    An anti-Pascal triangle is an equilateral triangular array of numbers such that, except for the numbers in the bottom row, each number is the absolute value of the difference of the two numbers immediately below it. For example, the following is an anti-Pascal triangle with four rows which contains every integer from $1$ to $10$.

    $4$
    $2\ \ \ \ 6$
    $5\ \ \ \ 7\ \ \ \ 1$
    $8\ \ \ \ 3\ \ \ \ 10\ \ \ \ 9$

    Does there exist an anti-Pascal triangle with $2018$ rows which contains every integer from $1$ to $1 + 2 + 3 + \dots + 2018$?
  source_url: https://www.imo-official.org/year_info.aspx?year=2018
- number: 4
  statement: |-
    A site is any point $(x, y)$ in the plane such that $x$ and $y$ are both positive integers less than or equal to 20.
    Initially, each of the 400 sites is unoccupied. Amy and Ben take turns
    placing stones with Amy going first.

    On her turn, Amy places a new red
    stone on an unoccupied site such that the distance between any two sites
     occupied by red stones is not equal to $\sqrt{5}$.

     On his turn, Ben places a new blue stone on any unoccupied site. (A
    site occupied by a blue stone is allowed to be at any distance from any
    other occupied site.) They stop as soon as a player cannot place a
    stone.

    Find the greatest $K$ such that Amy can ensure that she places at least $K$ red stones, no matter how Ben places his blue stones.
  source_url: https://www.imo-official.org/year_info.aspx?year=2018
- number: 5
  statement: Let $a_1$, $a_2$, $\ldots$ be an infinite sequence of positive integers. Suppose that there
    is an integer $N > 1$ such that, for each $n \geq N$, the number$\frac{a_1}{a_2} + \frac{a_2}{a_3}
    + \cdots + \frac{a_{n-1}}{a_n} + \frac{a_n}{a_1}$is an integer. Prove that there is a positive integer
    $M$ such that $a_m = a_{m+1}$ for all $m \geq M$.
  source_url: https://www.imo-official.org/year_info.aspx?year=2018
- number: 6
  statement: A convex quadrilateral $ABCD$ satisfies $AB\cdot CD = BC\cdot DA$. Point $X$ lies inside
    $ABCD$ so that $\angle{XAB} = \angle{XCD}\quad\,\,\text{and}\quad\,\,\angle{XBC} = \angle{XDA}.$Prove
    that $\angle{BXA} + \angle{DXC} = 180^\circ$.
  source_url: https://www.imo-official.org/year_info.aspx?year=2018
